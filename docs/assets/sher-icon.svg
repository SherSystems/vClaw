<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7200;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Lion Head (centered, larger) -->
  <g id="lion-icon">
    <!-- Mane circle -->
    <circle cx="100" cy="100" r="85" fill="url(#iconGrad)" opacity="0.9"/>

    <!-- Head -->
    <circle cx="100" cy="115" r="50" fill="#000"/>

    <!-- Eyes -->
    <circle cx="80" cy="105" r="7" fill="#FFF"/>
    <circle cx="120" cy="105" r="7" fill="#FFF"/>
    <!-- Eye pupils (AI look) -->
    <circle cx="80" cy="105" r="3" fill="#FF9500"/>
    <circle cx="120" cy="105" r="3" fill="#FF9500"/>

    <!-- Nose -->
    <polygon points="100,125 95,135 105,135" fill="#FFF"/>

    <!-- Mouth -->
    <path d="M 75 140 Q 100 150 125 140" stroke="#FFF" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Ears -->
    <polygon points="60,70 35,35 55,75" fill="#000"/>
    <polygon points="140,70 165,35 145,75" fill="#000"/>

    <!-- Mane detail lines (circuit/tech) -->
    <line x1="30" y1="80" x2="18" y2="70" stroke="#000" stroke-width="4" stroke-linecap="round"/>
    <line x1="25" y1="100" x2="10" y2="100" stroke="#000" stroke-width="4" stroke-linecap="round"/>
    <line x1="30" y1="120" x2="15" y2="135" stroke="#000" stroke-width="4" stroke-linecap="round"/>

    <line x1="170" y1="80" x2="182" y2="70" stroke="#000" stroke-width="4" stroke-linecap="round"/>
    <line x1="175" y1="100" x2="190" y2="100" stroke="#000" stroke-width="4" stroke-linecap="round"/>
    <line x1="170" y1="120" x2="185" y2="135" stroke="#000" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Code cursor accent (claw) -->
  <g id="claw-accent" transform="translate(125, 70)">
    <path d="M 0 0 L 25 25 L 10 35 L 0 15 Z" fill="#FF9500" stroke="#000" stroke-width="3" opacity="0.95"/>
    <!-- Bracket accent -->
    <path d="M 35 8 L 45 18 L 35 28" stroke="#FF9500" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
</svg>
