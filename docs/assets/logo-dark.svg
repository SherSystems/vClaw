<svg xmlns="http://www.w3.org/2000/svg" width="280" height="72" viewBox="0 0 280 72" fill="none">
  <defs>
    <linearGradient id="lionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FF7200"/>
    </linearGradient>
  </defs>
  <!-- Lion icon -->
  <g transform="translate(0, 0)">
    <!-- Mane -->
    <circle cx="36" cy="36" r="35" fill="url(#lionGrad)" opacity="0.9"/>
    <!-- Head -->
    <circle cx="36" cy="45" r="22" fill="#000"/>
    <!-- Eyes -->
    <circle cx="28" cy="40" r="3" fill="#FFF"/>
    <circle cx="44" cy="40" r="3" fill="#FFF"/>
    <circle cx="28" cy="40" r="1.3" fill="#FF9500"/>
    <circle cx="44" cy="40" r="1.3" fill="#FF9500"/>
    <!-- Nose -->
    <polygon points="36,50 34,55 38,55" fill="#FFF"/>
    <!-- Mouth -->
    <path d="M 24 57 Q 36 62 48 57" stroke="#FFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Ears -->
    <polygon points="18,18 12,5 17,21" fill="#000"/>
    <polygon points="54,18 60,5 55,21" fill="#000"/>
    <!-- Mane lines -->
    <line x1="6" y1="28" x2="2" y2="24" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="40" x2="0" y2="40" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="52" x2="1" y2="57" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    <line x1="66" y1="28" x2="70" y2="24" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    <line x1="68" y1="40" x2="72" y2="40" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    <line x1="66" y1="52" x2="71" y2="57" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    <!-- Claw accent -->
    <path d="M 56 14 L 66 24 L 60 28 L 56 20 Z" fill="#FF9500" stroke="#000" stroke-width="1.5" opacity="0.9"/>
    <path d="M 70 17 L 75 22 L 70 27" stroke="#FF9500" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Wordmark (white for dark backgrounds) -->
  <text x="88" y="48" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="42" fill="#E2E8F0" letter-spacing="-1.5">v</text>
  <text x="112" y="48" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="42" fill="#FF9500" letter-spacing="-1.5">Claw</text>
</svg>
